# Builds the Tauri desktop app on Windows and publishes a GitHub Release when a
# version tag (v*) is pushed. Can also be run manually (workflow_dispatch).
#
# Two artifacts are attached to the release:
#   - the portable executable (fast-copy.exe)
#   - the NSIS installer (Fast-copy_<version>_x64-setup.exe)
#
# WebView2 is the evergreen runtime already present on Windows 10/11, so it is
# not embedded; the app uses the system WebView2.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)."
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64 and publish release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # rust-toolchain.toml (in src-tauri) pins the compiler; rustup installs it
      # on first use. Show it for logging.
      - name: Show Rust version
        working-directory: src-tauri
        run: rustup show

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Frontend unit tests
        run: npm test

      # Build the frontend before cargo tests: generate_context! embeds dist/.
      - name: Build frontend
        run: npm run build

      - name: Cargo tests
        working-directory: src-tauri
        run: cargo test

      - name: Build Tauri app
        run: npm run tauri build

      - name: Determine tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Fast-copy ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/fast-copy.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe
          body: |
            Windows x64 build of Fast-copy (Tauri UI).

            - `fast-copy.exe` — portable executable. Requires the WebView2
              runtime, which ships with Windows 10/11.
            - `*-setup.exe` — NSIS installer.

            See the README for usage, the benchmark explanation, and known
            limitations (notably: ACLs are not preserved).
